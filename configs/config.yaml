# configs/config.yaml
# Centralized configuration for the entire project.

data:
  dataset_name: "ipythonx/wikiart-gangogh-creating-art-gan"
  local_dir: "G:/My Drive/wiki_art"  #local directory to store the downloaded file
  image_size: 224 #configurable image dimensions (H,W)
  batch_size: 64  #batch size to load images and labels during training
  num_workers: 2
  val_split: 0.15
  random_seed: 42

model:
  img_size: 224
  patch_size: 16        #configurable/research-purposes so this will be a hyperparameter
  in_channels: 3      #channels from the RGB images, if your images are grayscale set to 1
  num_classes: 27                  # Will be auto‑detected; placeholder
  embed_dim: 192                   # Tiny for quick iteration; 768 for ViT‑Base/ you can experiment with higher dimensions
  depth: 12  #number of encoder blocks
  num_heads: 3   #number of attention heads
  mlp_ratio: 4.0
  dropout: 0.1
  use_cls_token: true #indicator to use a special classification token(learnable parameter)

loss:
  type: "cross_entropy"            # cross_entropy / label_smoothing / focal
  label_smoothing: 0.1
  focal_alpha: 0.25
  focal_gamma: 2.0
  class_weight: "inverse_frequency"  # none / inverse_frequency

training:
  epochs: 10
  learning_rate: 0.0003
  optimizer: "adamw"
  weight_decay: 0.05
  scheduler: "cosine"              # cosine / step / none / can be reducelRonPlateau
  t_max: 10
  eta_min: 0.000001
  mixed_precision: false
  log_interval: 10                 # batches
  save_best_only: true

evaluation:
  top_k: 5

#model training dirs for different purposes(sub dirs)
paths:
  artefacts: "./artefacts"
  models_dir: "./artefacts/models"
  plots_dir: "./artefacts/plots"
  logs_dir: "./artefacts/logs"

api:
  host: "0.0.0.0"
  port: 8000